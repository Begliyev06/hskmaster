<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK MASTER - Hytay Dili we HSK tayarlyk kursy</title>
    <meta name="description" content="HSK MASTER - HSK1-6 courses. Learn Chinese effectively. Free platform to master Chinese and pass HSK exams! We focus on character etymology, essential grammar patterns and real-world conversations to ensure you don't just pass the exam, but truly master the language. Benefit from curated vocabulary lists, interactive practive tests, and expert guidance tailored to the latest HSK standarts">
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/header.css">
    <style>
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 32px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 0;
        }
        .class-preview {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: var(--premium-shadow);
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: flex;
            flex-direction: column;
        }
        .class-preview:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        .thumbnail-row {
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }
        .thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .class-preview:hover .thumbnail {
            transform: scale(1.05);
        }
        .course-description {
            padding: 24px;
            text-align: center;
        }
        .course-description p {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
        }
        .home-table {
            text-align: center;
            margin-bottom: 56px;
        }
        .home-table-content {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            color: var(--text-dark);
        }
        @media (max-width: 768px) {
            .home-table-content { font-size: 2.25rem; }
            .video-grid { grid-template-columns: 1fr; gap: 24px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="right-section">
            <p>HSK MASTER</p>
        </div>
    </header>

    <main>
        <div class="home-table">
            <h1 class="home-table-content">Biziň Kurslarymyz</h1>
        </div>

        <div class="video-grid">
            <a href="hsk1/hsk1-lessons-table.html" class="class-preview">
                <div class="thumbnail-row">
                    <img class="thumbnail" src="images/hsk1-new.jpeg" alt="HSK 1">
                </div>
                <div class="course-description"><p>HSK 1 Beginner</p></div>
            </a>

            <div class="class-preview">
                <div class="thumbnail-row">
                    <img class="thumbnail" src="images/hsk2-new.jpeg" alt="HSK 2">
                </div>
                <div class="course-description"><p>HSK 2 Upper-Beginner</p></div>
            </div>

            <div class="class-preview">
                <div class="thumbnail-row">
                    <img class="thumbnail" src="images/hsk3-new.png" alt="HSK 3">
                </div>
                <div class="course-description"><p>HSK 3 Elementary</p></div>
            </div>

            <div class="class-preview">
                <div class="thumbnail-row">
                    <img class="thumbnail" src="images/hsk4-new.jpeg" alt="HSK 4">
                </div>
                <div class="course-description"><p>HSK 4 Intermediate</p></div>
            </div>

            <div class="class-preview">
                <div class="thumbnail-row">
                    <img class="thumbnail" src="images/hsk5-new.jpeg" alt="HSK 5">
                </div>
                <div class="course-description"><p>HSK 5 Upper-Intermediate</p></div>
            </div>

            <div class="class-preview">
                <div class="thumbnail-row">
                    <img class="thumbnail" src="images/hsk6-new.jpeg" alt="HSK 6">
                </div>
                <div class="course-description"><p>HSK 6 Advanced</p></div>
            </div>
        </div>
    </main>
</body>
</html>
