<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .first-div{
            background-color: red;
            width: 100px;
            height: 100px;
        }
        .second-div{
            background-color: green;
            width: 100px;
            height: 100px;
            margin-top: 10px;
            border-radius: 50px;
        }
        .customer-service{
            border: solid;
            display: inline-block;
            padding-right: 30px;
            padding-left: 20px;
            padding-bottom: 20px;
            margin-top: 20px;
        }
        .youtube{
            background-color: darkgrey;
            display: inline-block;
            padding: 20px;
            margin-top: 20px;
        }
        .add{
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="first-div"></div>

    <div class="second-div"></div>
    <div class="customer-service">
        <p>Satisfied with our service?</p>
        <button>Yes</button>
        <button>No</button>
    </div>
    <div class="youtube">
        <p class="add"><strong>Install Youtube Music</strong></p>
        <p>Add Youtube to your desktop for quick and easy access</p>
    </div>
</body>
</html>
